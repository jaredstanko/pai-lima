# PAI Lima — Terminal Keybinding Requirements
#
# cmux must pass through these key sequences to the VM for Claude Code
# and tmux to work correctly. Most of these work by default.
#
# If any key doesn't work, check cmux Preferences → Keyboard.
#
# ─── Claude Code ───────────────────────────────────────────────
#
# Shift+Enter    Insert newline in Claude Code multi-line input
#                Must send escape sequence, not be captured by terminal.
#                cmux default: works (sends \e[13;2u or equivalent)
#
# Escape         Cancel current input / exit menus
# Ctrl+C         Interrupt running command
# Ctrl+D         Exit Claude Code
# Tab            Autocomplete
# Up/Down        History navigation
#
# ─── tmux (prefix: Ctrl+B) ────────────────────────────────────
#
# Ctrl+B         tmux prefix key — must NOT be captured by cmux
# Ctrl+B, d      Detach from session
# Ctrl+B, c      New window
# Ctrl+B, n/p    Next/previous window
# Ctrl+B, [      Enter scroll/copy mode
# Ctrl+B, %      Split pane vertically
# Ctrl+B, "      Split pane horizontally
# Mouse scroll   Scroll tmux buffer (if mouse mode enabled)
#
# ─── Verification ─────────────────────────────────────────────
#
# To test Shift+Enter in Claude Code:
#   1. Start claude in a workspace
#   2. Type a line, press Shift+Enter — should create a new line
#   3. If it submits instead, Shift+Enter is not being sent correctly
#
# To test tmux prefix:
#   1. In a tmux session, press Ctrl+B then d — should detach
#   2. If nothing happens, cmux is capturing Ctrl+B
#
# ─── Notes ────────────────────────────────────────────────────
#
# cmux does not currently have a dotfile-based config system.
# Keybindings are managed through the app's Preferences UI.
# This file serves as documentation for required keybinding state.
